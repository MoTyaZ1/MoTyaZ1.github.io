    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Красивая кнопка-ссылка</title>
    <style>
        .beautiful-button {
            background-color: #00a550; /* Цвет фона */
            border: none; /* Без границ */
            color: white; /* Цвет текста */
            padding: 15px 30px; /* Отступы */
            text-align: center; /* Выравнивание текста */
            text-decoration: none; /* Без подчеркивания */
            display: inline-block; /* Отображение в строке */
            font-size: 20px; /* Размер шрифта */
            margin: 10px 5px; /* Отступы */
            transition: background-color 0.3s, transform 0.3s; /* Плавные переходы */
            cursor: pointer; /* Указатель мыши */
            border-radius: 8px; /* Закругленные углы */
        }

        .beautiful-button:hover {
            background-color: #1f741f; /* Цвет фона при наведении */
            transform: scale(1.05); /* Увеличение кнопки при наведении */
        }
    </style>
</head>
